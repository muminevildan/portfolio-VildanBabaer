<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gönderilen Mesajlar — Vildan Babaer</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FFFCF8;
            --soft-pink: #FFE4EC;
            --dusty-rose: #f596b1;
            --rose-deep: #D4849C;
            --sage: #B8D4C0;
            --sage-light: #D4E8D8;
            --charcoal: #2C2C2C;
            --warm-gray: #6B6B6B;
            --light-gray: #E8E8E8;
            --lavender: #e2c6ed;
            --lavender-deep: #c09dd0;
            --peach: #FFD4C4;
            --peach-deep: #F5B8A0;
            --coral: #FFB5A7;
            --coral-soft: #FFD4CC;
            --mint: #C4F0E0;
            --mint-soft: #E0F5EE;
            --champagne: #F5E6D3;
            --gold: #E8D4A8;
            --blush: #F8E0E0;
            --sky-blue: #D4E8F5;
            --butter: #FFF4D4;
            --error: #E57373;
            --error-light: #FFEBEE;
            --success: #81C784;
            --success-light: #E8F5E9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--cream) 0%, var(--blush) 50%, var(--cream) 100%);
            background-attachment: fixed;
            color: var(--charcoal);
            line-height: 1.8;
            font-weight: 300;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        ::selection { background: var(--dusty-rose); color: white; }

        /* Arka Plan Efektleri */
        .organic-bg { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; overflow: hidden; pointer-events: none; }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); animation: float 15s infinite ease-in-out; }
        .blob-1 { width: 500px; height: 500px; background: linear-gradient(135deg, var(--soft-pink), var(--lavender)); top: -150px; right: -150px; animation-delay: 0s; }
        .blob-2 { width: 400px; height: 400px; background: linear-gradient(135deg, var(--sage), var(--mint)); bottom: 5%; left: -150px; animation-delay: 3s; }
        .blob-3 { width: 350px; height: 350px; background: linear-gradient(135deg, var(--peach), var(--coral-soft)); top: 35%; right: 5%; animation-delay: 6s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
            25% { transform: translate(30px, -30px) scale(1.1) rotate(5deg); }
            50% { transform: translate(-20px, 20px) scale(0.95) rotate(-5deg); }
            75% { transform: translate(20px, 10px) scale(1.05) rotate(3deg); }
        }

        .flower-decor { position: fixed; font-size: 2rem; opacity: 0.15; animation: rotate-flower 20s infinite linear; pointer-events: none; z-index: -1; }
        .flower-1 { top: 15%; left: 5%; animation-delay: 0s; }
        .flower-2 { top: 45%; right: 8%; animation-delay: -5s; font-size: 1.5rem; }
        .flower-3 { bottom: 25%; left: 12%; animation-delay: -10s; font-size: 1.8rem; }

        @keyframes rotate-flower { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Navigasyon */
        nav { position: fixed; top: 0; width: 100%; padding: 2rem 5%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(255, 252, 248, 0.85); backdrop-filter: blur(15px); border-bottom: 1px solid transparent; transition: all 0.4s ease; }
        nav.scrolled { border-bottom-color: var(--soft-pink); padding: 1.2rem 5%; background: rgba(255, 252, 248, 0.95); }
        
        .logo { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 1.8rem; 
            font-weight: 400; 
            letter-spacing: 2px; 
            color: var(--charcoal); 
            text-decoration: none; 
            position: relative;
            z-index: 1001;
        }
        .logo::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, var(--dusty-rose), var(--lavender-deep), var(--peach-deep)); transform: scaleX(0); transition: transform 0.4s ease; }
        .logo:hover::after { transform: scaleX(1); }

        #menu-toggle { display: none; }
        .hamburger { display: none; flex-direction: column; justify-content: space-between; width: 30px; height: 24px; cursor: pointer; z-index: 1001; position: relative; }
        .hamburger span { display: block; width: 100%; height: 3px; background: var(--charcoal); border-radius: 3px; transition: all 0.3s ease; transform-origin: center; }

        .nav-links { display: flex; gap: 3rem; list-style: none; transition: all 0.4s ease; }
        .nav-links a { color: var(--warm-gray); text-decoration: none; font-size: 0.85rem; letter-spacing: 1.5px; text-transform: uppercase; position: relative; padding: 0.5rem 0; transition: color 0.3s ease; }
        .nav-links a::before { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 2px; background: linear-gradient(90deg, var(--dusty-rose), var(--lavender-deep)); transition: width 0.4s ease; }
        .nav-links a:hover { color: var(--rose-deep); }
        .nav-links a:hover::before { width: 100%; }
        .nav-links a.active { color: var(--rose-deep); }
        .nav-links a.active::before { width: 100%; }

        /* Mesajlar Bölümü */
        section { padding: 10rem 10% 6rem; max-width: 1400px; margin: 0 auto; position: relative; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .section-header { margin-bottom: 4rem; display: flex; align-items: baseline; gap: 2rem; }
        .section-number { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-style: italic; background: linear-gradient(135deg, var(--dusty-rose), var(--lavender-deep)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .section-title { font-family: 'Cormorant Garamond', serif; font-size: 3rem; font-weight: 300; color: var(--charcoal); position: relative; }
        .section-title::after { content: ''; position: absolute; bottom: -10px; left: 0; width: 80px; height: 3px; background: linear-gradient(90deg, var(--dusty-rose), var(--lavender-deep), var(--peach-deep)); border-radius: 2px; }

        .stats-bar {
            display: flex;
            gap: 2rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }
        
        .stat-item {
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .stat-icon {
            font-size: 1.5rem;
        }
        
        .stat-content {
            display: flex;
            flex-direction: column;
        }
        
        .stat-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 600;
            color: var(--dusty-rose);
            line-height: 1;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: var(--warm-gray);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Mesaj Kartları */
        .message-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .message-card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            border-left: 4px solid var(--dusty-rose);
            transition: all 0.3s ease;
            animation: slideUp 0.5s ease;
        }
        
        .message-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .message-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--charcoal);
        }
        
        .message-date {
            font-size: 0.75rem;
            color: var(--warm-gray);
            background: var(--soft-pink);
            padding: 0.3rem 1rem;
            border-radius: 50px;
        }
        
        .message-subject {
            display: inline-block;
            background: linear-gradient(135deg, var(--lavender), var(--soft-pink));
            color: var(--charcoal);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 1rem;
        }
        
        .message-body {
            color: var(--warm-gray);
            line-height: 1.8;
            font-size: 0.95rem;
        }
        
        .message-contact {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--light-gray);
            font-size: 0.85rem;
            color: var(--warm-gray);
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--warm-gray);
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
        }
        
        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .clear-btn {
            background: linear-gradient(135deg, var(--error), #ef5350);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.4s ease;
            margin-top: 2rem;
        }
        
        .clear-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(229, 115, 115, 0.4);
        }

        /* Footer */
        footer { text-align: center; padding: 2rem; background: linear-gradient(180deg, transparent, rgba(255, 228, 236, 0.5)); color: var(--warm-gray); font-size: 0.85rem; letter-spacing: 1px; margin-top: auto; }
        .footer-quote { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-style: italic; background: linear-gradient(135deg, var(--dusty-rose), var(--lavender-deep)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.5rem; }
        .footer-hearts { margin-top: 0.5rem; font-size: 1.2rem; animation: heartbeat 1.5s infinite; }

        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* RESPONSIVE */
        @media (max-width: 968px) {
            section { padding-top: 8rem; padding-bottom: 4rem; }
            .section-title { font-size: 2.5rem; }
        }

        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 80%;
                max-width: 300px;
                height: 100vh;
                background: rgba(255, 252, 248, 0.98);
                backdrop-filter: blur(20px);
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 2rem;
                padding: 2rem;
                transition: right 0.4s ease;
                box-shadow: -10px 0 30px rgba(0,0,0,0.1);
                z-index: 999;
            }
            #menu-toggle:checked ~ .nav-links { right: 0; }
            #menu-toggle:checked ~ .hamburger span:nth-child(1) { transform: translateY(10.5px) rotate(45deg); }
            #menu-toggle:checked ~ .hamburger span:nth-child(2) { opacity: 0; }
            #menu-toggle:checked ~ .hamburger span:nth-child(3) { transform: translateY(-10.5px) rotate(-45deg); }
            #menu-toggle:checked ~ .menu-overlay { opacity: 1; visibility: visible; }
            .menu-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.3);
                opacity: 0;
                visibility: hidden;
                transition: all 0.4s ease;
                z-index: 998;
            }
            .nav-links a { font-size: 1.1rem; padding: 1rem; }
            section { padding: 7rem 5% 4rem; }
            .section-header { flex-direction: column; gap: 0.5rem; margin-bottom: 2.5rem; }
            .section-title { font-size: 2.2rem; }
            .stats-bar { justify-content: center; }
            .message-header { flex-direction: column; align-items: flex-start; }
        }

        @media (max-width: 480px) {
            .logo { font-size: 1.4rem; }
            .section-title { font-size: 1.8rem; }
            .stat-item { padding: 1rem 1.5rem; }
            .stat-number { font-size: 1.5rem; }
            .message-card { padding: 1.5rem; }
            .message-name { font-size: 1.2rem; }
        }

        /* Dark Theme */
        [data-theme="dark"] {
            --cream: #1a1a2e;
            --soft-pink: #2d2d44;
            --dusty-rose: #e8a4b8;
            --rose-deep: #f0b8c8;
            --sage: #4a5d5f;
            --sage-light: #3d4f52;
            --charcoal: #f5f0eb;
            --warm-gray: #c8c0b8;
            --light-gray: #4a4a6a;
            --lavender: #d4b8e8;
            --lavender-deep: #c8a8e0;
            --peach: #f0c8b8;
            --peach-deep: #e8b8a0;
            --blush: #2a2a3e;
        }
        [data-theme="dark"] nav { background: rgba(26, 26, 46, 0.9); border-bottom-color: var(--light-gray); }
        [data-theme="dark"] nav.scrolled { background: rgba(26, 26, 46, 0.95); }
        [data-theme="dark"] .nav-links { background: rgba(26, 26, 46, 0.98); }
        [data-theme="dark"] .message-card,
        [data-theme="dark"] .stat-item,
        [data-theme="dark"] .empty-state { background: rgba(40, 40, 60, 0.9); border: 1px solid var(--light-gray); }
        [data-theme="dark"] footer { background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.2)); }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            top: 100px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--soft-pink), var(--lavender));
            border: none;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: all 0.4s ease;
            color: var(--charcoal);
        }
        .theme-toggle:hover { transform: scale(1.1) rotate(15deg); box-shadow: 0 8px 30px rgba(232, 165, 184, 0.4); }

        @media (max-width: 968px) {
            .theme-toggle { top: 80px; right: 20px; width: 45px; height: 45px; font-size: 1.3rem; }
        }
        @media (max-width: 480px) {
            .theme-toggle { top: 70px; right: 15px; width: 40px; height: 40px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="organic-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="flower-decor flower-2">❀</div>
    <div class="flower-decor flower-1">✦</div>
    <div class="flower-decor flower-3">★</div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" title="Tema Değiştir">☀</button>

    <!-- Navigasyon -->
    <nav id="navbar">
        <a href="index-renkli (1).html" class="logo">✦ V. Portfolyo</a>
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="hamburger" aria-label="Menüyü Aç/Kapat">
            <span></span>
            <span></span>
            <span></span>
        </label>
        <label for="menu-toggle" class="menu-overlay"></label>
        <ul class="nav-links">
            <li><a href="index-renkli (1).html">Ana Sayfa</a></li>
            <li><a href="hakkımda.html">Hakkımda</a></li>
            <li><a href="projeler.html">Projeler</a></li>
            <li><a href="iletisim.html">İletişim</a></li>
            <li><a href="mesajlar.html" class="active">Mesajlar</a></li>
        </ul>
    </nav>

    <section id="messages">
        <div class="section-header">
            <span class="section-number">05</span>
            <h1 class="section-title">Gönderilen Mesajlar</h1>
        </div>

        <!-- İstatistikler -->
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-icon">✉</span>
                <div class="stat-content">
                    <span class="stat-number" id="totalCount">0</span>
                    <span class="stat-label">Toplam Mesaj</span>
                </div>
            </div>
            <div class="stat-item">
                <span class="stat-icon">✓</span>
                <div class="stat-content">
                    <span class="stat-number" id="todayCount">0</span>
                    <span class="stat-label">Bugün</span>
                </div>
            </div>
            <div class="stat-item">
                <span class="stat-icon">📅</span>
                <div class="stat-content">
                    <span class="stat-number" id="weekCount">0</span>
                    <span class="stat-label">Bu Hafta</span>
                </div>
            </div>
        </div>

        <!-- Mesaj Listesi -->
        <div class="message-list" id="messageList">
            <!-- Mesajlar buraya gelecek -->
        </div>

        <!-- Temizle Butonu -->
        <div style="text-align: center;">
            <button class="clear-btn" id="clearBtn" onclick="clearMessages()" style="display: none;">
                Tüm Mesajları Sil
            </button>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p class="footer-quote">"Her mesaj, yeni bir hikayenin başlangıcıdır"</p>
        <p>&copy; 2024 vildanbabaer. Tüm hakları saklıdır.</p>
        <p class="footer-hearts">✦ ✧ ✦</p>
    </footer>

    <script>
        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            html.setAttribute('data-theme', 'dark');
            themeToggle.textContent = '☾';
        }

        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            html.setAttribute('data-theme', newTheme);
            themeToggle.textContent = newTheme === 'dark' ? '☾' : '☀';
            localStorage.setItem('theme', newTheme);
        });

        // Navbar Scroll Effect
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Mobil Menü
        const menuToggle = document.getElementById('menu-toggle');
        if (menuToggle) {
            menuToggle.addEventListener('change', function() {
                document.body.style.overflow = this.checked ? 'hidden' : '';
            });
            
            document.querySelectorAll('.nav-links a').forEach(link => {
                link.addEventListener('click', () => {
                    menuToggle.checked = false;
                    document.body.style.overflow = '';
                });
            });
        }

        // ===== MESAJLARI YÜKLE =====
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function loadMessages() {
            const messages = JSON.parse(localStorage.getItem('contactMessages') || '[]');
            const list = document.getElementById('messageList');
            const totalCount = document.getElementById('totalCount');
            const todayCount = document.getElementById('todayCount');
            const weekCount = document.getElementById('weekCount');
            const clearBtn = document.getElementById('clearBtn');
            
            totalCount.textContent = messages.length;
            
            // Bugün ve bu hafta sayıları
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const weekAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
            
            let todayNum = 0;
            let weekNum = 0;
            
            messages.forEach(msg => {
                const msgDate = new Date(msg.id);
                if (msgDate >= today) todayNum++;
                if (msgDate >= weekAgo) weekNum++;
            });
            
            todayCount.textContent = todayNum;
            weekCount.textContent = weekNum;
            
            if (messages.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">✉</div>
                        <p>Henüz gönderilmiş mesaj yok.</p>
                        <p style="font-size: 0.85rem; margin-top: 0.5rem;">İletişim formundan mesaj gönderdiğinizde burada görünecek.</p>
                    </div>
                `;
                clearBtn.style.display = 'none';
                return;
            }
            
            clearBtn.style.display = 'inline-block';
            
            list.innerHTML = messages.map((msg, index) => `
                <div class="message-card" style="animation-delay: ${index * 0.1}s">
                    <div class="message-header">
                        <span class="message-name">${escapeHtml(msg.ad_soyad)}</span>
                        <span class="message-date">${msg.tarih}</span>
                    </div>
                    <span class="message-subject">${escapeHtml(msg.konu)}</span>
                    <p class="message-body">${escapeHtml(msg.mesaj)}</p>
                    <div class="message-contact">
                        <span>✉ ${escapeHtml(msg.email)}</span>
                        ${msg.telefon !== 'Belirtilmedi' ? `<span>☎ ${escapeHtml(msg.telefon)}</span>` : ''}
                    </div>
                </div>
            `).join('');
        }
        
        function clearMessages() {
            if (confirm('Tüm mesajları silmek istediğinize emin misiniz?')) {
                localStorage.removeItem('contactMessages');
                loadMessages();
            }
        }
        
        // Sayfa yüklenince mesajları göster
        loadMessages();
    </script>
</body>
</html>
